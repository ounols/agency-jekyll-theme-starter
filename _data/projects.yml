          label: "직접 설계하고 구현한<br>렌더링 파이프라인"
        - icon: "fa-solid fa-hexagon-nodes-bolt"
          label: "SDF 모델 베이킹<br>직접 구현"
        - icon: "fa-solid fa-arrow-up-right-dots"
          label: "실시간 SDF맵 갱신과<br>GI까지 구현"
