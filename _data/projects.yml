        - icon: "fa-solid fa-gears"
          label: "툴에 대한 사용법을 안내"
        - icon: "fa-solid fa-hand-point-up"
          label: "아티스트 원하는 의도대로<br>환경광을 설정하도록"
        - icon: "fa-solid fa-sliders"
