        caption: "G-buffer가 실시간으로 Directional Light의 영향을 받고 반영되는 영상"
        stack:
        - icon: "fa-solid fa-forward"
          label: "유니티에서 바로 확인가능"
        - icon: "fa-solid fa-panorama"
          label: "베이킹부터 실시간으로<br>GI가 적용되는 모습까지"
      - src: "https://ounols.kr/media/unity%EC%97%90-%EB%8F%99%EC%A0%81-%EC%A1%B0%EB%AA%85%EC%9D%84-%EC%A0%81%EC%9A%A9%ED%95%9C-global-illumination-%EA%B5%AC%ED%98%84/image%2010.png"
